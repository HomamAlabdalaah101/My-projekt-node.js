{% extends "base.html" %}

{% block content %}

<div class="contact pd-y" id="contact">
    <div class="section-header">
        <h2 class="section-titel">Update Profile:</h2>
        <span class="line"></span>
    </div>

    <!-- container -->
    <div class="container">
        <div class="contact-content">
            <div class="form">
                <h3 class="contact-title">Update Profile here:</h3>
                <form class="kontakt-form" method="post" action="/update_profile">
                    <div class="kotakt-form-item">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" value="{{user.name}}" required />
                    </div>
                    <div class="kotakt-form-item">
                        <label for="name">Password</label>
                        <input type="password" id="password" name="password"/>
                    </div>
               
                    <div class="kotakt-form-item">
                        <label for="email">E-Mail-Adresse</label>
                        <input type="text" id="email" name="email" value="{{user.email}}" required />
                    </div>
                    <input type="submit"  id="submit-btn" class="submit-btn hover-opacity" value="Update"></input>
                        
                
                </form>
            </div>
          
        </div>
    </div>

</div>


{% endblock %}
