{% extends "base.html" %}

{% block content %}
<div class="portfolio" id="portfolio">
    <div class="container">
        <div class="portfolio-item-content">
            <div class="portfolio-item-text">
                <h2 class="portfolio-item-title">{{des.name}}</h2>
                <p class="bt bs">{{des.country}}</p>
                <p>{{des.description}}</p>
                <button style="background-color: blueviolet;color: white;margin-top: 15px;" id="modal-btn"
                    class="delAccountBtn hover-opacity">User Comments</button>
            </div>
            <img src="/destinations/{{des.image}}" alt="" />
        </div>
    </div>
    <!-- /container -->
</div>
<!-- The Modal -->
<div id="myModal" class="modal">

    <!-- Modal content -->
    <div class="modal-content">
        <span class="close">&times;</span>
        <div>
            <h1>User Comments:</h1>
            {% for c in comms %}
            <div class="alert">
                <strong>{{c.name}} :</strong> {{c.comment}}
            </div>
            {% endfor %}

            {% if user %}
            <form style="display: flex;margin:10px;" method="post" action="/comment">
                <input type="hidden" name="destinationId" value="{{des.id}}" />
                <input type="text" id="comment" style="width: 80%;font-size: x-large;" placeholder="Add new comment"
                    name="comment" required>
                <button type="submit" style="width: 20%;font-size: x-large;">Post</button>
            </form>
            {% else %}
            <p>Please login to comment</p>
            {% endif %}

        </div>
    </div>

</div>
<script>
    let modal = document.getElementById("myModal");
    let btn = document.getElementById("modal-btn");
    let span = document.getElementsByClassName("close")[0];
    btn.onclick = function () {
        modal.style.display = "block";
    }
    span.onclick = function () {
        modal.style.display = "none";
    }
    window.onclick = function (event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
{% endblock %}
