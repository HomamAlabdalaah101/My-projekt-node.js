{% extends "base.html" %}

{% block content %}

<div class="portfolio pd-y" id="portfolio">
  <div class="section-header">
    <form style="display: flex;margin:10px;height: 70px;" method="get" action="/search">
        <input type="search" id="search" style="width: 80%;font-size: x-large;padding: 10px;" placeholder="e.g: Germany"
            name="search" value="{{search}}" required>
        <button type="submit" class="btn btn-learn hover-opacity" style="width: 20%;font-size: x-large;margin-top: 0%;">Search</button>
    </form>
      <h2 class="section-titel">Search Resuults for: {{search}}</h2>
      <span class="line"></span>
  </div>

  <div class="container">
      <div class="portfolio-content">
        {% for d in des %}
        <div class="portfolio-item">
          <img src="/destinations/{{d.image}}" alt="" />

          <div class="layer-content">
              <div class="layer-info">
                  <span class="category">{{d.country}}</span>
                  <h3 class="layer-content-titel">{{d.name}}</h3>
                  <a href="/destination/{{d.id}}"><i class="fa fa-search"></i></a>
              </div>
          </div>
          <!-- /layer-content -->
      </div>
        {% endfor %}
          <div class="clear"></div>
      </div>
      <!-- /portfolio-content -->
  </div>
  <!-- /container -->
</div>
{% endblock %}
