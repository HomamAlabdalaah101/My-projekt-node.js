{% extends "base.html" %} {% block content %}

<div class="contact pd-y" id="contact">
  <div class="section-header">
    <h2 class="section-titel">Sign In</h2>
    <span class="line"></span>
  </div>

  <!-- container -->
  <div class="container">
    <div class="contact-content">
      <div class="form" style="margin-bottom: 13.2%">
        <h3 class="contact-title">Sign in here:</h3>
        <form class="kontakt-form" method="post" action="/login">
          <div class="kotakt-form-item">
            <label for="vorname">Username</label>
            <input type="text" id="username" name="username" />
          </div>
          <div class="kotakt-form-item">
            <label for="name">Password</label>
            <input type="password" id="password" name="password" />
          </div>
          <button
            id="submit-btn"
            type="submit"
            class="submit-btn hover-opacity"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
